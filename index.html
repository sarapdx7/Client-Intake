    const { useState } = React;


    const DB_NAME = "FinancialIntake";
    const DB_VERSION = 1;
    const STORE_NAME = "session";
    const SESSION_KEY = "current";

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => e.target.result.createObjectStore(STORE_NAME);
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
      });
    }

    async function saveSessionToDB(data) {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).put({ ...data, savedAt: new Date().toISOString() }, SESSION_KEY);
        db.close();
      } catch(e) { console.warn("Save failed", e); }
    }

    async function loadSessionFromDB() {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, "readonly");
        const result = await new Promise((res, rej) => {
          const req = tx.objectStore(STORE_NAME).get(SESSION_KEY);
          req.onsuccess = () => res(req.result);
          req.onerror = rej;
        });
        db.close();
        return result || null;
      } catch(e) { return null; }
    }

    async function clearSessionFromDB() {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(SESSION_KEY);
        db.close();
      } catch(e) {}
    }


    async function exportZip(formData, uploadedFiles) {
      const zip = new JSZip();
      const clientName = [formData.firstName, formData.lastName].filter(Boolean).join("_") || "client";

      // Build CSV
      const rows = [["Section", "Field", "Value"]];
      SECTIONS.forEach((section) => {
        section.fields.forEach((field) => {
          if (["fileonly","docupload","mortgagebreakdown","multiasset","multiincome","multiloan","multicredit","multidebt","expensegroup"].includes(field.type)) {
            if (field.type === "multiasset") { const a = formData[field.id]; if (Array.isArray(a)) a.forEach((r,i) => { rows.push([section.title,`Other Asset ${i+1} - Name`,r.name||""]); rows.push([section.title,`Other Asset ${i+1} - Value`,r.amount||""]); }); }
            else if (field.type === "multiincome") { const a = formData[field.id]; if (Array.isArray(a)) a.forEach((r,i) => { rows.push([section.title,`Other Income ${i+1} - Source`,r.source||""]); rows.push([section.title,`Other Income ${i+1} - Amount`,r.amount||""]); }); }
            else if (field.type === "multiloan") { const a = formData[field.id]; if (Array.isArray(a)) a.forEach((r,i) => { rows.push([section.title,`Auto Loan ${i+1} - Lender`,r.name||""]); rows.push([section.title,`Auto Loan ${i+1} - Balance`,r.balance||""]); rows.push([section.title,`Auto Loan ${i+1} - APR`,r.rate||""]); rows.push([section.title,`Auto Loan ${i+1} - Payment`,r.payment||""]); }); }
            else if (field.type === "multicredit") { const a = formData[field.id]; if (Array.isArray(a)) a.forEach((r,i) => { rows.push([section.title,`Card ${i+1} - Name`,r.name||""]); rows.push([section.title,`Card ${i+1} - Balance`,r.balance||""]); rows.push([section.title,`Card ${i+1} - Limit`,r.limit||""]); rows.push([section.title,`Card ${i+1} - APR`,r.apr||""]); }); }
            else if (field.type === "multidebt") { const a = formData[field.id]; if (Array.isArray(a)) a.forEach((r,i) => { rows.push([section.title,`Debt ${i+1} - Description`,r.name||""]); rows.push([section.title,`Debt ${i+1} - Balance`,r.balance||""]); rows.push([section.title,`Debt ${i+1} - Rate`,r.rate||""]); rows.push([section.title,`Debt ${i+1} - Payment`,r.payment||""]); }); }
            else if (field.type === "expensegroup") { const a = formData[field.id] || field.defaultRows || []; a.forEach(r => { if (r.category||r.amount) rows.push([section.title+" - "+field.label, r.category||"", r.amount||""]); }); }
            else if (field.type === "mortgagebreakdown") { const bd = formData[field.id]||{}; Object.entries({principal:"P&I",propertyTax:"Property Tax",homeInsurance:"Home Insurance",pmi:"PMI",hoaFee:"HOA",floodInsurance:"Flood Insurance",melloRoos:"Mello-Roos",other:"Other"}).forEach(([k,l]) => { if (bd[k]) rows.push([section.title, "Mortgage - "+l, bd[k]]); }); }
          } else {
            const val = formData[field.id] || "";
            rows.push([section.title, field.label, String(val)]);
          }
        });
      });
      const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
      zip.file(`${clientName}_intake.csv`, csv);
      zip.file(`${clientName}_session.json`, JSON.stringify({ version:1, savedAt: new Date().toISOString(), formData }, null, 2));

      // Add vault docs to zip
      const vaultDocs = uploadedFiles["doc_vault"] || [];
      vaultDocs.forEach(doc => {
        const folder = (doc.type || "Documents").replace(/[^a-zA-Z0-9]/g, "_");
        if (doc.file) {
          const b64 = doc.file.data.split(",")[1];
          zip.folder(folder).file(doc.file.name, b64, { base64: true });
        }
      });

      const folderMap = { file_mortgage:"Mortgage", file_studentloan:"Student_Loans", file_paystub:"Pay_Stubs", file_taxreturn:"Tax_Returns", file_lifeins:"Life_Insurance", file_estate:"Estate_Docs", file_bank:"Bank_Statements", file_brokerage:"Brokerage_Statements", doc_catchall:"Supporting_Documents" };
      Object.entries(uploadedFiles).forEach(([id, files]) => {
        const folder = folderMap[id] || "Documents";
        files.forEach(f => { const b64 = f.data.split(",")[1]; zip.folder(folder).file(f.name, b64, { base64: true }); });
      });

      const blob = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url;
      a.download = `${clientName}_financial_intake.zip`; a.click();
      URL.revokeObjectURL(url);
    }

    function exportSession(formData, completed) {
      const session = { version: 1, savedAt: new Date().toISOString(), formData, completed: Array.from(completed) };
      const blob = new Blob([JSON.stringify(session, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url;
      const name = [formData.firstName, formData.lastName].filter(Boolean).join("_") || "client";
      a.download = `${name}_intake_session.json`; a.click();
      URL.revokeObjectURL(url);
    }

    function importSession(file, onSuccess) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const s = JSON.parse(e.target.result);
          if (s.formData) onSuccess(s.formData, new Set(s.completed || []));
          else alert("Invalid session file.");
        } catch { alert("Could not read session file."); }
      };
      reader.readAsText(file);
    }

function Field({ field, value, onChange }) {
  const base = {
    width: "100%",
    background: "#1e1e28",
    border: `1px solid ${COLORS.border}`,
    borderRadius: "6px",
    color: COLORS.text,
    fontSize: "14px",
    padding: "10px 12px",
    outline: "none",
    fontFamily: "inherit",
    transition: "border-color 0.2s",
    boxSizing: "border-box",
  };

  if (field.type === "select") {
    return (
      <select
        value={value || ""}
        onChange={(e) => onChange(field.id, e.target.value)}
        style={{ ...base, cursor: "pointer" }}
        onFocus={(e) => (e.target.style.borderColor = COLORS.accent)}
        onBlur={(e) => (e.target.style.borderColor = COLORS.border)}
      >
        <option value="">— Select —</option>
        {field.options.map((o) => <option key={o} value={o}>{o}</option>)}
      </select>
    );
  }

  if (field.type === "textarea") {
    return (
      <textarea
        value={value || ""}
        onChange={(e) => onChange(field.id, e.target.value)}
        placeholder={field.placeholder || ""}
        rows={3}
        style={{ ...base, resize: "vertical", lineHeight: "1.5" }}
        onFocus={(e) => (e.target.style.borderColor = COLORS.accent)}
        onBlur={(e) => (e.target.style.borderColor = COLORS.border)}
      />
    );
  }

  return (
    <input
      type={field.type}
      value={value || ""}
      onChange={(e) => onChange(field.id, e.target.value)}
      placeholder={field.placeholder || ""}
      style={{ ...base, paddingRight: field.type === "date" ? "40px" : "12px" }}
      onFocus={(e) => (e.target.style.borderColor = COLORS.accent)}
      onBlur={(e) => (e.target.style.borderColor = COLORS.border)}
    />
  );
}


function ExpenseGroupField({ field, value, onChange }) {
  const initial = value && Array.isArray(value) ? value : (field.defaultRows || []);
  const rows = value && Array.isArray(value) ? value : initial;

  const addRow = () => onChange([...rows, { category: "", amount: "" }]);
  const updateRow = (i, key, val) => onChange(rows.map((r, idx) => idx === i ? { ...r, [key]: val } : r));
  const removeRow = (i) => onChange(rows.filter((_, idx) => idx !== i));

  // Initialize with defaults if not yet set
  if (!value) {
    // Will render with defaultRows on first paint
  }

  const inputStyle = {
    background: "#1e1e28", border: `1px solid ${COLORS.border}`, borderRadius: "6px",
    color: COLORS.text, fontSize: "13px", padding: "8px 10px", outline: "none",
    fontFamily: "inherit", boxSizing: "border-box", width: "100%",
  };

  return (
    <div style={{ marginBottom: "8px" }}>
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 28px", gap: "8px", marginBottom: "6px" }}>
        {["Category", "Monthly Amount ($)", ""].map((h, i) => (
          <div key={i} style={{ fontSize: "10px", letterSpacing: "0.1em", color: COLORS.muted, textTransform: "uppercase", paddingLeft: "2px" }}>{h}</div>
        ))}
      </div>

    function FileUploadButton({ uploadId, hint, uploadedFiles, setUploadedFiles }) {
      const files = uploadedFiles[uploadId] || [];
      const handleFiles = (e) => {
        const promises = Array.from(e.target.files).map(f => new Promise(resolve => {
          const reader = new FileReader();
          reader.onload = (ev) => resolve({ name: f.name, data: ev.target.result, type: f.type, uploadId });
          reader.readAsDataURL(f);
        }));
        Promise.all(promises).then(loaded => {
          setUploadedFiles(prev => ({ ...prev, [uploadId]: [...(prev[uploadId] || []), ...loaded] }));
        });
        e.target.value = "";
      };
      const removeFile = (i) => setUploadedFiles(prev => {
        const updated = [...(prev[uploadId] || [])]; updated.splice(i, 1);
        return { ...prev, [uploadId]: updated };
      });
      return (
        <div style={{ marginTop: "8px" }}>
          <label style={{ display: "inline-flex", alignItems: "center", gap: "6px", padding: "6px 12px", background: "transparent", border: `1px dashed ${files.length > 0 ? COLORS.complete : COLORS.border}`, borderRadius: "6px", color: files.length > 0 ? COLORS.complete : COLORS.muted, cursor: "pointer", fontSize: "12px", fontFamily: "inherit" }}>
            <span>{files.length > 0 ? "✓" : "⊕"}</span>
            {files.length > 0 ? `${files.length} file${files.length > 1 ? "s" : ""} attached` : (hint || "Attach file")}
            <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx" style={{ display: "none" }} onChange={handleFiles} />
          </label>
          {files.length > 0 && (
            <div style={{ marginTop: "6px", display: "flex", flexWrap: "wrap", gap: "6px" }}>
              {files.map((f, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: "6px", padding: "4px 10px", background: "#1e1e28", border: `1px solid ${COLORS.border}`, borderRadius: "20px", fontSize: "12px", color: COLORS.text }}>

                  <button onClick={() => removeFile(i)} style={{ background: "transparent", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: "14px", padding: 0, lineHeight: 1 }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

      ];

      const vaultKey = "doc_vault";

      const [newDoc, setNewDoc] = React.useState({ type: "", description: "", file: null });
      const [adding, setAdding] = React.useState(false);

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => setNewDoc(prev => ({ ...prev, file: { name: file.name, data: ev.target.result, type: file.type } }));
        reader.readAsDataURL(file);
        e.target.value = "";
      };

      const handleAdd = () => {
        if (!newDoc.file) return;
        const entry = { ...newDoc, id: Date.now() };
        setUploadedFiles(prev => ({ ...prev, [vaultKey]: [...(prev[vaultKey] || []), entry] }));
        setNewDoc({ type: "", description: "", file: null });
        setAdding(false);

              {docs.map((doc) => (
                <div key={doc.id} style={{ display: "flex", alignItems: "flex-start", gap: "12px", padding: "14px 16px", background: "#1e1e28", border: `1px solid ${COLORS.border}`, borderRadius: "8px" }}>
                  <span style={{ fontSize: "20px", marginTop: "2px" }}>📄</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: "12px", color: COLORS.accent, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: "2px" }}>{doc.type || "Document"}</div>
                    <div style={{ fontSize: "14px", color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{doc.file.name}</div>
                    {doc.description && <div style={{ fontSize: "12px", color: COLORS.muted, marginTop: "2px" }}>{doc.description}</div>}
                  </div>
                  <button onClick={() => removeDoc(doc.id)} style={{ background: "transparent", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: "18px", padding: 0, flexShrink: 0 }}>×</button>
                </div>
              ))}
            </div>
          )}

          {/* Add new doc form */}
          {adding ? (
            <div style={{ padding: "20px", background: "#1e1e28", border: `1px solid ${COLORS.accent}44`, borderRadius: "10px", display: "flex", flexDirection: "column", gap: "14px" }}>
              <div>
                <label style={{ display: "block", fontSize: "11px", letterSpacing: "0.12em", color: COLORS.muted, textTransform: "uppercase", marginBottom: "6px" }}>Document Type</label>
                <select value={newDoc.type} onChange={(e) => setNewDoc(p => ({ ...p, type: e.target.value }))} style={inputStyle}>
                  <option value="">— Select type —</option>
                  {DOC_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label style={{ display: "block", fontSize: "11px", letterSpacing: "0.12em", color: COLORS.muted, textTransform: "uppercase", marginBottom: "6px" }}>Description (optional)</label>
                <input type="text" placeholder="e.g. 2024 Federal Tax Return" value={newDoc.description} onChange={(e) => setNewDoc(p => ({ ...p, description: e.target.value }))} style={inputStyle} />
              </div>
              <div>
                <label style={{ display: "block", fontSize: "11px", letterSpacing: "0.12em", color: COLORS.muted, textTransform: "uppercase", marginBottom: "6px" }}>File</label>
                {newDoc.file ? (
                  <div style={{ display: "flex", alignItems: "center", gap: "10px", padding: "10px 14px", background: "#16161d", border: `1px solid ${COLORS.complete}44`, borderRadius: "6px" }}>
                    <span>📄</span>
                    <span style={{ flex: 1, fontSize: "13px", color: COLORS.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{newDoc.file.name}</span>
                    <button onClick={() => setNewDoc(p => ({ ...p, file: null }))} style={{ background: "transparent", border: "none", color: COLORS.muted, cursor: "pointer", fontSize: "14px", padding: 0 }}>×</button>
                  </div>
                ) : (
                  <label style={{ display: "flex", alignItems: "center", gap: "8px", padding: "10px 14px", background: "#16161d", border: `1px dashed ${COLORS.border}`, borderRadius: "6px", cursor: "pointer", color: COLORS.muted, fontSize: "13px", fontFamily: "inherit" }}>
                    <span style={{ fontSize: "16px" }}>⊕</span> Choose file
                    <input type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx,.xls,.xlsx,.csv" style={{ display: "none" }} onChange={handleFileSelect} />
                  </label>
                )}
              </div>
              <div style={{ display: "flex", gap: "10px" }}>
                <button onClick={handleAdd} disabled={!newDoc.file} style={{ padding: "10px 24px", background: newDoc.file ? COLORS.accent : COLORS.border, color: newDoc.file ? "#0f0f14" : COLORS.muted, border: "none", borderRadius: "6px", fontSize: "14px", fontWeight: 700, cursor: newDoc.file ? "pointer" : "default", fontFamily: "inherit" }}>Add Document</button>
                <button onClick={() => { setAdding(false); setNewDoc({ type: "", description: "", file: null }); }} style={{ padding: "10px 20px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "6px", fontSize: "14px", cursor: "pointer", fontFamily: "inherit" }}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAdding(true)} style={{ display: "flex", alignItems: "center", gap: "6px", background: "transparent", border: `1px dashed ${COLORS.border}`, borderRadius: "6px", color: COLORS.muted, cursor: "pointer", fontSize: "13px", padding: "10px 16px", fontFamily: "inherit", transition: "all 0.2s" }}
              onMouseOver={(e) => { e.currentTarget.style.borderColor = COLORS.accent; e.currentTarget.style.color = COLORS.accentLight; }}
              onMouseOut={(e) => { e.currentTarget.style.borderColor = COLORS.border; e.currentTarget.style.color = COLORS.muted; }}>
              <span style={{ fontSize: "18px", lineHeight: 1 }}>+</span> Add Document
            </button>
          )}
        </div>
      );
    }

    function SectionNav({ sections, current, completed, onSelect }) {
  return (
    <div style={{ display: "flex", overflowX: "auto", gap: "0", borderBottom: `1px solid ${COLORS.border}`, paddingBottom: "0" }}>
      {sections.map((s, i) => {
        const isCurrent = current === i;
        const isDone = completed.has(i);
        return (
          <button
            key={s.id}
            onClick={() => onSelect(i)}
            style={{
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: "4px",
              padding: "12px 16px",
              background: "transparent",
              border: "none",
              borderBottom: isCurrent ? `2px solid ${COLORS.accent}` : "2px solid transparent",
              color: isCurrent ? COLORS.accentLight : isDone ? COLORS.complete : COLORS.muted,
              fontSize: "11px",
              cursor: "pointer",
              textAlign: "center",
              fontFamily: "inherit",
              transition: "all 0.15s",
              whiteSpace: "nowrap",
              flexShrink: 0,
              marginBottom: "-1px",
            }}
          >
            <span style={{ fontSize: "18px" }}>{isDone ? "✓" : s.icon}</span>
            <span style={{ fontWeight: isCurrent ? 600 : 400, letterSpacing: "0.05em", textTransform: "uppercase", fontSize: "10px" }}>{s.title}</span>
          </button>
        );
      })}
    </div>
  );
}





function App() {
  const [currentSection, setCurrentSection] = useState(0);
  const [formData, setFormData] = useState({});
  const [completed, setCompleted] = useState(new Set());
  const [submitted, setSubmitted] = useState(false);
  const [uploadedFiles, setUploadedFiles] = useState({});
  const [resumePrompt, setResumePrompt] = useState(null);

  React.useEffect(() => {
    loadSessionFromDB().then(saved => {
      if (saved && saved.formData && Object.keys(saved.formData).length > 0) {
        const clientName = [saved.formData.firstName, saved.formData.lastName].filter(Boolean).join(" ") || "Unknown Client";
        setResumePrompt({ ...saved, clientName });
      }
    });
  }, []);

  const handleChange = (id, value) => {
    setFormData((prev) => ({ ...prev, [id]: value }));
  };

  const handleNext = () => {
    const newCompleted = new Set([...completed, currentSection]);
    setCompleted(newCompleted);
    if (currentSection < SECTIONS.length - 1) {
      setCurrentSection(currentSection + 1);
      saveSessionToDB({ formData, completed: Array.from(newCompleted), uploadedFiles, currentSection: currentSection + 1 });
    } else {
      setSubmitted(true);
    }
  };

  const handleBack = () => {
    if (currentSection > 0) setCurrentSection(currentSection - 1);
  };

  const section = SECTIONS[currentSection];
  const progress = Math.round((completed.size / SECTIONS.length) * 100);

  if (submitted) {
    return (
      <div style={{ minHeight: "100vh", background: COLORS.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Cormorant Garamond', Georgia, serif", color: COLORS.text }}>
        <div style={{ textAlign: "center", maxWidth: "480px", padding: "48px" }}>
          <div style={{ fontSize: "64px", marginBottom: "24px" }}>◈</div>
          <h1 style={{ fontSize: "32px", fontWeight: 300, color: COLORS.accentLight, marginBottom: "12px", letterSpacing: "0.05em" }}>Intake Complete</h1>
          <p style={{ color: COLORS.muted, fontSize: "16px", marginBottom: "40px", lineHeight: 1.6 }}>
            All sections have been filled out for{" "}
            <strong style={{ color: COLORS.text }}>{[formData.firstName, formData.lastName].filter(Boolean).join(" ") || "this client"}</strong>.
            Export the data to CSV to import into your planning software.
          </p>
          <div style={{ display: "flex", gap: "12px", justifyContent: "center" }}>
            <button
              onClick={() => exportZip(formData, uploadedFiles)}
              style={{ padding: "14px 28px", background: COLORS.accent, color: "#0f0f14", border: "none", borderRadius: "8px", fontSize: "15px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.05em" }}
            >
              ⬇ Export ZIP
            </button>
            <button
              onClick={() => { setSubmitted(false); setCurrentSection(0); }}
              style={{ padding: "14px 28px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "8px", fontSize: "15px", cursor: "pointer", fontFamily: "inherit" }}
            >
              Review
            </button>
            <button
              onClick={() => { clearSessionFromDB(); setFormData({}); setCompleted(new Set()); setUploadedFiles({}); setSubmitted(false); setCurrentSection(0); }}
              style={{ padding: "14px 28px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "8px", fontSize: "15px", cursor: "pointer", fontFamily: "inherit" }}
            >
              New Client
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, fontFamily: "'Cormorant Garamond', Georgia, serif", color: COLORS.text }}>
      {resumePrompt && (
      <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Cormorant Garamond', Georgia, serif" }}>
        <div style={{ background: "#16161d", border: `1px solid ${COLORS.border}`, borderRadius: "12px", padding: "40px", maxWidth: "420px", width: "90%", textAlign: "center" }}>
          <div style={{ fontSize: "40px", marginBottom: "16px" }}>◈</div>
          <h2 style={{ fontSize: "24px", fontWeight: 300, color: COLORS.accentLight, marginBottom: "8px" }}>Resume Session?</h2>
          <p style={{ color: COLORS.muted, fontSize: "14px", marginBottom: "4px" }}>Saved session found for</p>
          <p style={{ color: COLORS.text, fontSize: "20px", fontWeight: 600, marginBottom: "4px" }}>{resumePrompt.clientName}</p>
          <p style={{ color: COLORS.muted, fontSize: "11px", letterSpacing: "0.05em", marginBottom: "32px" }}>Last saved: {new Date(resumePrompt.savedAt).toLocaleString()}</p>
          <div style={{ display: "flex", gap: "12px", justifyContent: "center" }}>
            <button onClick={() => { setFormData(resumePrompt.formData); setCompleted(new Set(resumePrompt.completed||[])); setUploadedFiles(resumePrompt.uploadedFiles||{}); setCurrentSection(resumePrompt.currentSection||0); setResumePrompt(null); }} style={{ padding: "12px 28px", background: COLORS.accent, color: "#0f0f14", border: "none", borderRadius: "8px", fontSize: "15px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>Resume</button>
            <button onClick={() => { clearSessionFromDB(); setResumePrompt(null); }} style={{ padding: "12px 24px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "8px", fontSize: "15px", cursor: "pointer", fontFamily: "inherit" }}>Start Fresh</button>
          </div>
        </div>
      </div>
    )}
      {/* Header */}
      <div style={{ borderBottom: `1px solid ${COLORS.border}`, padding: "20px 40px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ fontSize: "11px", letterSpacing: "0.2em", color: COLORS.muted, textTransform: "uppercase", marginBottom: "4px" }}>Financial Planning Group</div>
          <div style={{ fontSize: "20px", color: COLORS.accentLight, fontWeight: 300, letterSpacing: "0.05em" }}>Client Intake Form</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: "16px" }}>
          <div style={{ display: "flex", gap: "8px" }}>
            <button
              onClick={() => exportSession(formData, completed)}
              style={{ padding: "7px 14px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "6px", fontSize: "12px", cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.05em" }}
            >↓ Save</button>
            <label style={{ padding: "7px 14px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "6px", fontSize: "12px", cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.05em" }}>
              ↑ Load
              <input type="file" accept=".json" style={{ display: "none" }} onChange={(e) => {
                if (e.target.files[0]) importSession(e.target.files[0], (data, comp) => { setFormData(data); setCompleted(comp); setSubmitted(false); });
                e.target.value = "";
              }} />
            </label>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: "11px", color: COLORS.muted, letterSpacing: "0.1em", marginBottom: "6px" }}>{progress}% COMPLETE</div>
            <div style={{ width: "140px", height: "3px", background: COLORS.border, borderRadius: "2px" }}>
              <div style={{ height: "100%", width: `${progress}%`, background: COLORS.accent, borderRadius: "2px", transition: "width 0.4s ease" }} />
            </div>
          </div>
        </div>
      </div>

      {/* Section Nav */}
      <div style={{ borderBottom: `1px solid ${COLORS.border}`, padding: "0 40px" }}>
        <SectionNav sections={SECTIONS} current={currentSection} completed={completed} onSelect={setCurrentSection} />
      </div>

      {/* Body */}
      <div style={{ padding: "40px", maxWidth: "680px", margin: "0 auto" }}>
        {/* Form */}
        <div style={{ flex: 1 }}>
          <div style={{ marginBottom: "32px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "8px" }}>
              <span style={{ fontSize: "28px", color: COLORS.accent }}>{section.icon}</span>
              <h2 style={{ fontSize: "28px", fontWeight: 300, letterSpacing: "0.05em", margin: 0 }}>{section.title}</h2>
            </div>
            <div style={{ height: "1px", background: `linear-gradient(to right, ${COLORS.accent}44, transparent)` }} />
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: "20px" }}>
            {section.fields.map((field) => (
              <div key={field.id}>
                {field.type !== "mortgagebreakdown" && (
                  <label style={{ display: "block", fontSize: "11px", letterSpacing: "0.12em", color: COLORS.muted, textTransform: "uppercase", marginBottom: "6px" }}>
                    {field.label}
                  </label>
                )}
                {field.type === "multiasset" ? (
                  <MultiAssetField
                    value={formData[field.id]}
                    onChange={(val) => handleChange(field.id, val)}
                  />
                ) : field.type === "expensegroup" ? (
                  <ExpenseGroupField
                    field={field}
                    value={formData[field.id] || field.defaultRows}
                    onChange={(val) => handleChange(field.id, val)}
                  />
                ) : field.type === "multidebt" ? (
                  <MultiDebtField value={formData[field.id]} onChange={(val) => handleChange(field.id, val)} />
                ) : field.type === "multiloan" ? (
                  <MultiLoanField value={formData[field.id]} onChange={(val) => handleChange(field.id, val)} />
                ) : field.type === "multicredit" ? (
                  <MultiCreditField value={formData[field.id]} onChange={(val) => handleChange(field.id, val)} />
                ) : field.type === "mortgagebreakdown" ? (
                  <MortgageBreakdownField
                    value={formData[field.id]}
                    onChange={(val) => handleChange(field.id, val)}
                  />
                ) : field.type === "multiincome" ? (
                  <MultiIncomeField
                    value={formData[field.id]}
                    onChange={(val) => handleChange(field.id, val)}
                  />
                ) : (
                  <>
                    <Field field={field} value={formData[field.id]} onChange={handleChange} />
                    {field.uploadHint && <FileUploadButton uploadId={field.uploadId} hint={field.uploadHint} uploadedFiles={uploadedFiles} setUploadedFiles={setUploadedFiles} />}
                  </>
                )}
              </div>
            ))}
          </div>

          {/* Navigation */}
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: "40px", paddingTop: "24px", borderTop: `1px solid ${COLORS.border}` }}>
            <button
              onClick={handleBack}
              disabled={currentSection === 0}
              style={{ padding: "12px 24px", background: "transparent", color: currentSection === 0 ? COLORS.border : COLORS.muted, border: `1px solid ${currentSection === 0 ? COLORS.border : COLORS.border}`, borderRadius: "6px", fontSize: "14px", cursor: currentSection === 0 ? "default" : "pointer", fontFamily: "inherit", letterSpacing: "0.05em" }}
            >
              ← Back
            </button>
            <div style={{ display: "flex", gap: "12px" }}>
              <button
                onClick={() => exportZip(formData, uploadedFiles)}
                style={{ padding: "12px 20px", background: "transparent", color: COLORS.muted, border: `1px solid ${COLORS.border}`, borderRadius: "6px", fontSize: "13px", cursor: "pointer", fontFamily: "inherit" }}
              >
                Export Draft
              </button>
              <button
                onClick={handleNext}
                style={{ padding: "12px 28px", background: COLORS.accent, color: "#0f0f14", border: "none", borderRadius: "6px", fontSize: "14px", fontWeight: 700, cursor: "pointer", fontFamily: "inherit", letterSpacing: "0.05em" }}
              >
                {currentSection === SECTIONS.length - 1 ? "Complete Intake" : "Next →"}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
